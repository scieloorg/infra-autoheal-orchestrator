receivers:
  - name: infra-autoheal-orchestrator
    webhook_configs:
      - url: http://infra-autoheal-orchestrator:8000/webhook/alertmanager
        send_resolved: false

# Segurança:
# O Alertmanager precisa chegar ao orquestrador com um token em:
#   Authorization: Bearer <ORCH_WEBHOOK_TOKEN>
# ou:
#   X-Webhook-Token: <ORCH_WEBHOOK_TOKEN>
#
# Se a versão do Alertmanager em uso não suportar headers para webhook_configs,
# coloque um proxy interno entre Alertmanager e orquestrador para injetar o header.

route:
  receiver: infra-autoheal-orchestrator
  group_by: ["alertname", "instance"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 30m
